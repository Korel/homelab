# /etc/nginx/nginx.conf
user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
    # multi_accept on;
}

http {

    server {
        listen 127.0.0.1:4443 ssl http2 proxy_protocol;
        listen 127.0.0.1:8080 proxy_protocol;
        server_name *.korel.be.eu.org korel.be.eu.org;

        ssl_certificate /etc/letsencrypt/live/korel.be.eu.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/korel.be.eu.org/privkey.pem;

        # Get real IP from PROXY protocol
        set_real_ip_from 127.0.0.1;
        real_ip_header proxy_protocol;

        default_type text/html;
        return 403 '<html><head><meta charset="utf-8"></head><body><h1>🌍 Geo-blocked</h1></body></html>';
    }


    ##
    # Basic Settings
    ##

    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    # server_tokens off;

    # server_names_hash_bucket_size 64;
    # server_name_in_redirect off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings
    ##

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
    ssl_prefer_server_ciphers on;

    ##
    # Logging Settings
    ##

    access_log /var/log/nginx/access.log;

    ##
    # Gzip Settings
    ##

    gzip on;

    # gzip_vary on;
    # gzip_proxied any;
    # gzip_comp_level 6;
    # gzip_buffers 16 8k;
    # gzip_http_version 1.1;
    # gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    ##
    # Virtual Host Configs
    ##

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}


