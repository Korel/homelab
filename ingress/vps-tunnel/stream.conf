# /etc/nginx/modules-enabled/stream.conf
# To apply after changes: sudo nginx -t && sudo systemctl reload nginx
stream {
    geoip2 /var/lib/GeoIP/GeoLite2-Country.mmdb {
        $geo_country_code country iso_code;
        # Country codes: 
        # DE = Germany, BE = Belgium, TR = Turkey, NL = Netherlands
    }

    log_format stream_detailed '$remote_addr [$time_local] '
                               'country=$geo_country_code '
                               'backend=$upstream_addr '
                               'bytes=$bytes_sent/$bytes_received '
                               'duration=${session_time}s';
    access_log /var/log/nginx/stream_access.log stream_detailed;

    # Limit concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=stream_conn:10m;

    # IP whitelist — these IPs/CIDRs route to homelab regardless of geo
    # (nginx "geo" is just an IP-to-value lookup with CIDR support, not related to geography)
    geo $is_whitelisted {
        default 0;
        # Add whitelisted IPs or CIDRs here, e.g.:
        # 1.2.3.4   1;
        # 10.0.0.0/8 1;
    }

    # Single routing decision: whitelisted IP OR allowed country → homelab
    map "$is_whitelisted:$geo_country_code" $route_to_homelab {
        default 0;
        ~^1:    1;
        "0:DE"  1;
    }

    map $route_to_homelab $backend_http {
        default "127.0.0.1:8080";
        1       100.94.6.82:80;
    }

    map $route_to_homelab $backend_https {
        default "127.0.0.1:4443";
        1       100.94.6.82:443;
    }

    map $route_to_homelab $backend_udp {
        default "127.0.0.1:4443";
        1       100.94.6.82:443;
    }

    # HTTP
    server {
        listen 80;
        proxy_pass $backend_http;
        proxy_protocol on;
        limit_conn stream_conn 100;
    }

    # HTTPS
    server {
        listen 443;
        proxy_pass $backend_https;
        proxy_protocol on;
        limit_conn stream_conn 100;
    }

    # HTTP3/QUIC
    server {
        listen 443 udp;
        proxy_pass $backend_udp;
    }
}